<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>新発田市観光マップ</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<h1>新発田市観光マップ</h1>

<div id="info">

<p id="speed">
速度: 0 km/h
</p>

<p id="distance">
移動距離: 0 m
</p>

<div id="gpsData">

<p id="latitude">
緯度: -
</p>

<p id="longitude">
経度: -
</p>

<p id="accuracy">
精度: -
</p>

</div>

<button id="followBtn">
追従: ON
</button>

<button id="resetBtn">
リセット
</button>

<button id="toggleGpsBtn">
GPS情報を隠す
</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="script.js"></script>

</body>

</html>
